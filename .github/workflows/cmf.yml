name: Build Vivo T4 Kernel
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio curl flex git libssl-dev libncurses5-dev zlib1g-dev libelf-dev dwarves wget unzip xz-utils tar

      - name: Download and Extract Source
        run: |
          FILE_ID="1psqhj83p4ZdxOCBIFwP3rVsbwhzvGrm2"
          # Bypass the Google Drive "Virus Scan" warning page
          CONFIRM=$(wget --quiet --save-cookies /tmp/cookies.txt --keep-session-cookies --no-check-certificate "https://docs.google.com/uc?export=download&id=$FILE_ID" -O- | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1\n/p' | head -n 1)
          wget --load-cookies /tmp/cookies.txt "https://docs.google.com/uc?export=download&confirm=$CONFIRM&id=$FILE_ID" -O kernel.tar.gz
          
          # Extract the source
          mkdir source
          tar -xzvf kernel.tar.gz -C source --strip-components=1
          echo "Source extracted successfully."

      - name: Build Kernel
        run: |
          cd source
          # Locate exact clang toolchain (r487747c) from inside the source
          export CLANG_PATH=$(find $PWD -name "clang-r487747c" | head -n 1)
          export PATH=$CLANG_PATH/bin:$PATH
          
          # Build environment for Vivo T4 (SM7635)
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-android-
          
          # Build vmlinux and Image
          make O=out gki_defconfig
          make -j$(nproc) O=out vmlinux Image

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-output
          path: |
            source/out/vmlinux
            source/out/include/generated/asm-offsets.h
            
