name: Build Vivo T4 Kernel
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Actions
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio curl flex git libssl-dev libncurses5-dev zlib1g-dev libelf-dev dwarves wget unzip xz-utils tar

      - name: Download Source from GitHub Release
        run: |
          wget -O kernel.tar.gz "https://github.com/abdulla-li/Android-Kernel-Builder/releases/download/Build/android_16.0_kernel_SM7635.tar.gz"
          ls -lh kernel.tar.gz

      - name: Extract Source
        run: |
          mkdir source
          tar -xzvf kernel.tar.gz -C source --strip-components=1

      - name: Build Kernel
        run: |
          cd source
          
          # 1. Setup Toolchain (Finds clang-r487747c automatically)
          export CLANG_PATH=$(find $PWD -name "clang-r487747c" | head -n 1)
          export PATH=$CLANG_PATH/bin:$PATH
          
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-android-
          
          # 2. Get exact config path and strip the suffix safely
          CONFIG_PATH=$(find $PWD -name "gki_defconfig" | head -n 1)
          echo "Found config at: $CONFIG_PATH"
          
          # This cuts off either "/arm64/configs/gki_defconfig" or "/arch/arm64/configs/gki_defconfig"
          KERNEL_DIR=$(echo "$CONFIG_PATH" | sed -E 's|/arch/arm64/configs/gki_defconfig$||; s|/arm64/configs/gki_defconfig$||')
          
          echo "Navigating to Kernel Root: $KERNEL_DIR"
          cd "$KERNEL_DIR"
          
          # 3. Build vmlinux and Image
          make O=out gki_defconfig
          make -j$(nproc) O=out vmlinux Image
          
          # 4. Prepare artifacts for upload
          mkdir -p $GITHUB_WORKSPACE/upload_artifacts
          cp out/vmlinux $GITHUB_WORKSPACE/upload_artifacts/ || true
          cp out/include/generated/asm-offsets.h $GITHUB_WORKSPACE/upload_artifacts/ || true

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-output
          path: upload_artifacts/
          
