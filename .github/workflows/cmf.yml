name: Build Vivo T4 Kernel
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio curl flex git libssl-dev libncurses5-dev zlib1g-dev libelf-dev dwarves wget unzip xz-utils tar

      - name: Extract Local Source
        run: |
          # Ensure 'android_16.0_kernel_SM7635.tar.gz' is in your repo root
          mkdir source
          tar -xzvf android_16.0_kernel_SM7635.tar.gz -C source --strip-components=1

      - name: Build Kernel
        run: |
          cd source
          # Locate the clang toolchain (r487747c) inside your source
          export CLANG_PATH=$(find $PWD -name "clang-r487747c" | head -n 1)
          export PATH=$CLANG_PATH/bin:$PATH
          
          # Environment variables for Vivo SM7635 build
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-android-
          
          # Configure and Build
          make O=out gki_defconfig
          make -j$(nproc) O=out vmlinux Image
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-output
          path: |
            source/out/vmlinux
            source/out/include/generated/asm-offsets.h
            
