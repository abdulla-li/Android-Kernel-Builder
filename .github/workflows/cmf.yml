name: Build Vivo T4 Kernel
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Build Environment
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential cpio curl flex git libssl-dev libncurses5-dev zlib1g-dev libelf-dev dwarves wget unzip xz-utils tar clang lld llvm binutils

      - name: Setup Toolchain
        run: |
          git clone --depth=1 https://github.com/llvm/llvm-project -b llvmorg-17.0.2
          export ARCH=arm64
          export SUBARCH=arm64
          export CC=clang
          export LLVM=1
          export LLVM_IAS=1
          echo "ARCH=arm64" >> $GITHUB_ENV
          echo "SUBARCH=arm64" >> $GITHUB_ENV
          echo "CC=clang" >> $GITHUB_ENV
          echo "LLVM=1" >> $GITHUB_ENV
          echo "LLVM_IAS=1" >> $GITHUB_ENV

      - name: Download and Extract Source
        run: |
          # Replace with your direct Google Drive link
          wget --no-check-certificate 'https://drive.google.com/drive/u/2/mobile/my-drive' -O kernel.tar.gz
          mkdir source
          tar -xzvf kernel.tar.gz -C source --strip-components=1

      - name: Build Kernel and vmlinux
        run: |
          cd source
          make O=out gki_defconfig
          # Build vmlinux (uncompressed, contains symbols) and the compressed Image
          make -j$(nproc) O=out vmlinux Image
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kernel-build-output
          path: |
            source/out/vmlinux
            source/out/arch/arm64/boot/Image
            source/out/include/generated/asm-offsets.h
